version: 1
framework: next-i18next
localization:
  roots:
    - public/locales/**
  defaultLocale: en
  # Include zz-pseudo so tooling matches Next + worker path-based pseudo screenshots
  locales: [en, fr, vi, zz-pseudo]
  namespaces: [common, home, products, checkout, product]

# i18n section read by LingoPilot worker internal runner (M4)
i18n:
  locales_dir: public/locales
  namespaces: [common, home, products, checkout, product]
  source_locale: en
  pseudo_locale: zz-pseudo

routes:
  include: ["/", "/products", "/checkout", "/product/[id]"]
  samples:
    "/product/[id]": { id: "123" }
screenshots:
  viewports:
    - { width: 1280, height: 800 }
  waitUntil: networkidle0
pr:
  labels: ["i18n", "lingopilot"]
